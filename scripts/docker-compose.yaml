version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: postgres-local
    restart: unless-stopped

    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: bhaga_banti

    ports:
      - '5432:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d bhaga_banti']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
